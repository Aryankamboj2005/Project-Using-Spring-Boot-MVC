spring.application.name=Ecom-Project
# MySQL Database Connection
# The URL tells Spring WHICH database to connect to on your computer (localhost)
spring.datasource.url=jdbc:mysql://localhost:3306/product
spring.datasource.username=root
spring.datasource.password=Aryan2005@

# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate (JPA) Settings
# 'update' automatically creates/updates your tables based on your Java @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect is no longer needed in modern Spring/Hibernate versions
# It will automatically detect the correct dialect for you.

# Multipart File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

